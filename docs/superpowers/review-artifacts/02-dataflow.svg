<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <marker id="a-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="a-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#059669"/></marker>
    <marker id="a-o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="a-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker>
    <marker id="a-dc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>
  <rect width="1400" height="900" fill="#fbfbfd"/>
  <text x="700" y="38" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">典型查询数据流："10.33.17.100 负载多少？影响什么服务？"</text>
  <text x="700" y="62" font-size="13" text-anchor="middle" fill="#64748b">spec §3.3 数据流可视化 · 蓝色=主数据流 · 绿色=Zabbix · 橙色=关联 · 紫色=编排</text>
  <rect x="620" y="90" width="160" height="50" rx="25" fill="#0f172a"/>
  <text x="700" y="120" font-size="14" font-weight="700" text-anchor="middle" fill="#f8fafc">用户</text>
  <rect x="540" y="170" width="320" height="60" rx="8" fill="#1e293b"/>
  <text x="700" y="196" font-size="13" font-weight="700" text-anchor="middle" fill="#f8fafc">main (协调)</text>
  <text x="700" y="216" font-size="10" text-anchor="middle" fill="#cbd5e1">路由：主机状态/负载 → linux agent</text>
  <line x1="700" y1="140" x2="700" y2="170" stroke="#2563eb" stroke-width="2.5" marker-end="url(#a-b)"/>
  <rect x="708" y="147" width="70" height="16" rx="3" fill="#fbfbfd" opacity="0.95"/>
  <text x="743" y="159" font-size="10" text-anchor="middle" fill="#2563eb">自然语言</text>
  <rect x="540" y="260" width="320" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="284" font-size="13" font-weight="700" text-anchor="middle" fill="#92400e">🆕 linux agent</text>
  <text x="700" y="304" font-size="10" text-anchor="middle" fill="#92400e">host-status skill 编排</text>
  <text x="700" y="318" font-size="10" text-anchor="middle" fill="#92400e">提取 IP → 调 CLI → 融合答案</text>
  <line x1="700" y1="230" x2="700" y2="260" stroke="#ea580c" stroke-width="2" marker-end="url(#a-o)"/>
  <rect x="708" y="237" width="50" height="16" rx="3" fill="#fbfbfd" opacity="0.95"/>
  <text x="733" y="249" font-size="10" text-anchor="middle" fill="#ea580c">分发</text>
  <rect x="100" y="360" width="400" height="80" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="300" y="384" font-size="13" font-weight="700" text-anchor="middle" fill="#065f46">host-query status 10.33.17.100</text>
  <text x="300" y="404" font-size="11" text-anchor="middle" fill="#059669">取实时指标 + host_id</text>
  <text x="300" y="422" font-size="10" text-anchor="middle" fill="#059669">① Zabbix API · ② /host/resolve</text>
  <rect x="900" y="360" width="400" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="1100" y="384" font-size="13" font-weight="700" text-anchor="middle" fill="#1e40af">aiops-query impact &lt;host_id&gt;</text>
  <text x="1100" y="404" font-size="11" text-anchor="middle" fill="#2563eb">Neo4j 多跳影响分析</text>
  <text x="1100" y="422" font-size="10" text-anchor="middle" fill="#2563eb">direct + downstream + upstream</text>
  <line x1="620" y1="330" x2="300" y2="360" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#a-b)"/>
  <line x1="780" y1="330" x2="1100" y2="360" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#a-b)"/>
  <text x="490" y="340" font-size="10" fill="#6b7280">① 先</text>
  <text x="950" y="340" font-size="10" fill="#6b7280"> 后(需 host_id)</text>
  <rect x="100" y="470" width="400" height="130" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="300" y="494" font-size="13" font-weight="700" text-anchor="middle" fill="#065f46">host-access 内部</text>
  <rect x="120" y="506" width="170" height="40" rx="5" fill="#fff" stroke="#059669"/>
  <text x="205" y="522" font-size="11" font-weight="600" text-anchor="middle" fill="#065f46">zabbix/client.py</text>
  <text x="205" y="538" font-size="9" text-anchor="middle" fill="#059669">get_host_by_ip(IP)</text>
  <rect x="310" y="506" width="170" height="40" rx="5" fill="#fff" stroke="#ea580c"/>
  <text x="395" y="522" font-size="11" font-weight="600" text-anchor="middle" fill="#92400e">relation/resolver</text>
  <text x="395" y="538" font-size="9" text-anchor="middle" fill="#ea580c">GET /resolve?ip=</text>
  <rect x="120" y="560" width="360" height="30" rx="5" fill="#065f46"/>
  <text x="300" y="580" font-size="11" font-weight="600" text-anchor="middle" fill="#ecfdf5">返回: {CPU, MEM, DISK, NET, LOAD, host_id}</text>
  <rect x="900" y="470" width="400" height="130" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1100" y="494" font-size="13" font-weight="700" text-anchor="middle" fill="#1e40af">rag 拓扑查询</text>
  <rect x="920" y="506" width="360" height="40" rx="5" fill="#fff" stroke="#2563eb"/>
  <text x="1100" y="522" font-size="11" font-weight="600" text-anchor="middle" fill="#1e40af">GET /impact?host_id=</text>
  <text x="1100" y="538" font-size="9" text-anchor="middle" fill="#2563eb">Neo4j: direct + downstream(3hop) + upstream</text>
  <rect x="920" y="560" width="360" height="30" rx="5" fill="#1e3a8a"/>
  <text x="1100" y="580" font-size="11" font-weight="600" text-anchor="middle" fill="#dbeafe">返回: {host_id, impact_summary, direct, downstream, upstream}</text>
  <line x1="300" y1="440" x2="300" y2="470" stroke="#059669" stroke-width="2" marker-end="url(#a-g)"/>
  <line x1="1100" y1="440" x2="1100" y2="470" stroke="#2563eb" stroke-width="2" marker-end="url(#a-b)"/>
  <rect x="100" y="630" width="400" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="300" y="654" font-size="12" font-weight="700" text-anchor="middle" fill="#991b1b">Zabbix JSON-RPC API（外部）</text>
  <text x="300" y="672" font-size="10" text-anchor="middle" fill="#dc2626">host.get · item.get · history.get</text>
  <line x1="205" y1="546" x2="205" y2="630" stroke="#dc2626" stroke-width="1.8" marker-end="url(#a-dc)"/>
  <rect x="213" y="580" width="60" height="16" rx="3" fill="#fbfbfd" opacity="0.95"/>
  <text x="243" y="592" font-size="9" text-anchor="middle" fill="#dc2626">实时指标</text>
  <line x1="395" y1="546" x2="395" y2="570" stroke="#ea580c" stroke-width="1.8" marker-end="url(#a-o)"/>
  <rect x="403" y="548" width="70" height="16" rx="3" fill="#fbfbfd" opacity="0.95"/>
  <text x="438" y="560" font-size="9" text-anchor="middle" fill="#ea580c">IP→host_id</text>
  <rect x="400" y="720" width="600" height="80" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="700" y="746" font-size="13" font-weight="700" text-anchor="middle" fill="#6b21a8">🔀 融合层（linux agent）</text>
  <text x="700" y="766" font-size="11" text-anchor="middle" fill="#7c3aed">状态指标 + 影响服务 = 组织自然语言答案</text>
  <text x="700" y="784" font-size="10" text-anchor="middle" fill="#7c3aed">示例: "host_es_master_01 (10.33.17.100) CPU 12.3%, 影响 es/kibana 及下游 logstash"</text>
  <line x1="300" y1="600" x2="550" y2="720" stroke="#7c3aed" stroke-width="2" marker-end="url(#a-p)"/>
  <line x1="1100" y1="600" x2="850" y2="720" stroke="#7c3aed" stroke-width="2" marker-end="url(#a-p)"/>
  <text x="420" y="670" font-size="10" fill="#7c3aed">指标+host_id</text>
  <text x="960" y="670" font-size="10" fill="#7c3aed">影响拓扑</text>
  <path d="M700,720 C700,680 700,660 700,140" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#a-p)"/>
  <rect x="708" y="690" width="70" height="16" rx="3" fill="#fbfbfd" opacity="0.95"/>
  <text x="743" y="702" font-size="10" text-anchor="middle" fill="#7c3aed">融合答案</text>
  <rect x="100" y="820" width="1200" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="700" y="844" font-size="12" font-weight="600" text-anchor="middle" fill="#334155">时序依赖：host-query 必须先完成（返回 host_id）→ 才能调 aiops-query impact</text>
  <text x="700" y="864" font-size="11" text-anchor="middle" fill="#64748b">串行编排，非并行。host_id 是关键传递变量。</text>
</svg>