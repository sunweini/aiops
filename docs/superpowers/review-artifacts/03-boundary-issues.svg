  <text x="1050" y="348" font-size="9" fill="#334155">topology clusters:0 · get_host_cluster 空跑</text>
  <text x="1050" y="364" font-size="9" fill="#059669">→ spec 应标注已知限制</text>
  <rect x="1036" y="394" width="308" height="68" rx="5" fill="#fef2f2" stroke="#ea580c" stroke-width="1.2"/>
  <text x="1050" y="410" font-size="11" font-weight="700" fill="#ea580c">🔴 Issue #4: 指标键硬编码 [中危]</text>
  <text x="1050" y="426" font-size="9" fill="#334155">eth0/根分区假设 · 多网卡多挂载不覆盖</text>
  <text x="1050" y="442" font-size="9" fill="#059669">→ 需 iface 发现 + 多 fs 配置</text>
  <rect x="1036" y="472" width="308" height="68" rx="5" fill="#fef2f2" stroke="#ea580c" stroke-width="1.2"/>
